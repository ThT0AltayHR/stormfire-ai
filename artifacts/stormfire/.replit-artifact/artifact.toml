kind = "mobile"
previewPath = "/"
title = "Storm'fire"
version = "1.0.0"
id = "artifacts/stormfire"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 24327

[services.development]
run = "pnpm --filter @workspace/stormfire run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stormfire", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/stormfire", "run", "serve" ]

[services.env]
PORT = "24327"
BASE_PATH = "/"
