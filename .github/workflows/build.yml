name: "Storm'fire — Build Android APK (Local Gradle)"

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Expo Prebuild (generate Android native project)
        working-directory: artifacts/stormfire
        run: |
          npx expo prebuild --platform android --clean --no-install
        env:
          CI: 1

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        working-directory: artifacts/stormfire/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: artifacts/stormfire/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: Find and rename APK
        run: |
          find artifacts/stormfire/android -name "*.apk" | head -5
          APK=$(find artifacts/stormfire/android -name "app-debug.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" stormfire-debug.apk
          echo "APK_PATH=stormfire-debug.apk" >> $GITHUB_ENV

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stormfire-android-debug-apk
          path: stormfire-debug.apk
          retention-days: 30
          if-no-files-found: error
